<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정기평가 상담 현황 - 원장 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; color: #111; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header .sub { font-size: 13px; color: #888; margin-left: auto; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  .view { display: none; }
  .view.active { display: block; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: #fff; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #e5e5e5; }
  .stat-num { font-size: 26px; font-weight: 600; }
  .stat-num.green { color: #1D9E75; }
  .stat-num.blue { color: #185FA5; }
  .stat-num.red { color: #c0392b; }
  .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
  .prog-wrap { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #e5e5e5; margin-bottom: 16px; }
  .prog-bar { height: 8px; background: #eee; border-radius: 99px; overflow: hidden; margin: 8px 0; }
  .prog-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width .4s; }
  .prog-label { font-size: 13px; color: #555; }
  .teacher-list { display: flex; flex-direction: column; gap: 10px; }
  .teacher-card { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #e5e5e5; cursor: pointer; }
  .teacher-card:hover { border-color: #1D9E75; }
  .tc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .tc-name { font-size: 15px; font-weight: 600; }
  .tc-count { font-size: 13px; color: #888; }
  .tc-bar { height: 5px; background: #eee; border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .tc-fill { height: 100%; background: #1D9E75; border-radius: 99px; }
  .tc-stats { font-size: 12px; color: #888; display: flex; gap: 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #1D9E75; }
  .dot.blue { background: #185FA5; }
  .dot.red { background: #c0392b; }
  .back-btn { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #555; cursor: pointer; padding: 8px 0 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: #888; padding: 14px 0 6px; border-bottom: 1px solid #e5e5e5; margin-bottom: 2px; }
  .student-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid #f0f0f0; background: #fff; }
  .student-row.done { background: #f0faf5; }
  .s-name { font-size: 14px; font-weight: 500; min-width: 58px; }
  .student-row.done .s-name { color: #1D9E75; text-decoration: line-through; }
  .s-info { font-size: 12px; color: #888; flex: 1; }
  .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid #ddd; color: #888; }
  .status-badge.missed { border-color: #c0392b; color: #c0392b; background: #fdf0ef; }
  .status-badge.called { border-color: #185FA5; color: #185FA5; background: #eaf2fc; }
  .status-badge.done { border-color: #1D9E75; color: #1D9E75; background: #edfaf4; }
  .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1 id="header-title">정기평가 상담 현황</h1>
  <span class="sub" id="header-sub">원장 대시보드</span>
</div>
<div class="container">
  <div id="view-dashboard" class="view active">
    <div class="loading" id="loading-msg">데이터를 불러오는 중...</div>
    <div class="stats-row" id="all-stats"></div>
    <div class="prog-wrap" id="all-prog-wrap" style="display:none;">
      <div class="prog-label" id="all-prog-label"></div>
      <div class="prog-bar"><div class="prog-fill" id="all-prog-fill" style="width:0%"></div></div>
    </div>
    <div class="teacher-list" id="teacher-list"></div>
  </div>
  <div id="view-teacher" class="view">
    <div class="back-btn" onclick="showDashboard()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      대시보드로
    </div>
    <div class="stats-row" id="teacher-stats"></div>
    <div class="prog-wrap">
      <div class="prog-label" id="teacher-prog-label"></div>
      <div class="prog-bar"><div class="prog-fill" id="teacher-prog-fill" style="width:0%"></div></div>
    </div>
    <div id="teacher-content"></div>
  </div>
</div>
<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxJheJBdMCTRk2tIqyP8fyGs_RlceyNt_V47WF_AGu-rIYyIYhNcwqnebNvbMkRJKTqw/exec';
var allData = [];
var currentTeacher = null;

async function fetchData() {
  try {
    var res = await fetch(SCRIPT_URL + '?t=' + Date.now());
    var json = await res.json();
    if (json.status === 'ok') { allData = json.data; return true; }
  } catch(e) {}
  return false;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getCounts(rows) {
  var done=0, called=0, missed=0;
  rows.forEach(function(r) {
    if(r.status==='기록완료') done++;
    else if(r.status==='통화완료') called++;
    else if(r.status==='부재중') missed++;
  });
  return { done: done, called: called, missed: missed, total: rows.length };
}

function renderStats(id, c) {
  document.getElementById(id).innerHTML =
    '<div class="stat"><div class="stat-num">' + c.total + '</div><div class="stat-label">전체</div></div>' +
    '<div class="stat"><div class="stat-num green">' + c.done + '</div><div class="stat-label">기록완료</div></div>' +
    '<div class="stat"><div class="stat-num blue">' + c.called + '</div><div class="stat-label">통화완료</div></div>' +
    '<div class="stat"><div class="stat-num red">' + c.missed + '</div><div class="stat-label">부재중</div></div>';
}

function renderDashboard() {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('all-prog-wrap').style.display = '';
  var c = getCounts(allData);
  var pct = c.total ? Math.round(c.done/c.total*100) : 0;
  renderStats('all-stats', c);
  document.getElementById('all-prog-label').textContent = '기록완료 ' + pct + '% (' + c.done + '/' + c.total + '명)';
  document.getElementById('all-prog-fill').style.width = pct + '%';
  var teachers = [];
  allData.forEach(function(r) { if (teachers.indexOf(r.teacher) === -1) teachers.push(r.teacher); });
  document.getElementById('teacher-list').innerHTML = teachers.map(function(t) {
    var tc = getCounts(allData.filter(function(r) { return r.teacher === t; }));
    var tp = tc.total ? Math.round(tc.done/tc.total*100) : 0;
    var safe = escapeHtml(t);
    return '<div class="teacher-card" data-teacher="' + safe + '">' +
      '<div class="tc-top"><span class="tc-name">' + safe + ' 선생님</span><span class="tc-count">' + tc.done + '/' + tc.total + '명</span></div>' +
      '<div class="tc-bar"><div class="tc-fill" style="width:' + tp + '%"></div></div>' +
      '<div class="tc-stats">' +
        '<span><span class="dot green"></span>기록완료 ' + tc.done + '</span>' +
        '<span><span class="dot blue"></span>통화완료 ' + tc.called + '</span>' +
        '<span><span class="dot red"></span>부재중 ' + tc.missed + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

document.getElementById('teacher-list').addEventListener('click', function(e) {
  var card = e.target.closest('.teacher-card');
  if (card) showTeacher(card.dataset.teacher);
});

function renderTeacher(teacher) {
  var rows = allData.filter(function(r) { return r.teacher === teacher; });
  var c = getCounts(rows);
  var pct = c.total ? Math.round(c.done/c.total*100) : 0;
  renderStats('teacher-stats', c);
  document.getElementById('teacher-prog-label').textContent = '기록완료 ' + pct + '% (' + c.done + '/' + c.total + '명)';
  document.getElementById('teacher-prog-fill').style.width = pct + '%';
  var classOrder = [];
  rows.forEach(function(r) { if (classOrder.indexOf(r.class) === -1) classOrder.push(r.class); });
  var html = '';
  classOrder.forEach(function(cls) {
    var students = rows.filter(function(r) { return r.class === cls; });
    html += '<div class="section-title">' + escapeHtml(cls) + ' (' + students.length + '명)</div>';
    students.forEach(function(s) {
      var v = s.status || '';
      var badgeClass = v==='기록완료'?'done':v==='통화완료'?'called':v==='부재중'?'missed':'';
      html += '<div class="student-row' + (v==='기록완료'?' done':'') + '">' +
        '<span class="s-name">' + escapeHtml(s.name) + '</span>' +
        '<span class="s-info">' + escapeHtml(s.school || '') + ' &middot; ' + escapeHtml(s.phone || '') + '</span>' +
        (v ? '<span class="status-badge ' + badgeClass + '">' + escapeHtml(v) + '</span>' : '') +
      '</div>';
    });
  });
  document.getElementById('teacher-content').innerHTML = html;
}

function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showTeacher(teacher) {
  currentTeacher = teacher;
  document.getElementById('header-title').textContent = teacher + ' 선생님';
  document.getElementById('header-sub').textContent = '';
  renderTeacher(teacher);
  showView('view-teacher');
}

function showDashboard() {
  currentTeacher = null;
  document.getElementById('header-title').textContent = '정기평가 상담 현황';
  document.getElementById('header-sub').textContent = '원장 대시보드';
  renderDashboard();
  showView('view-dashboard');
}

async function init() {
  var ok = await fetchData();
  if (!ok) {
    document.getElementById('loading-msg').textContent = '데이터를 불러올 수 없습니다. 페이지를 새로고침 해주세요.';
    document.getElementById('loading-msg').style.color = '#c0392b';
    return;
  }
  renderDashboard();
  setInterval(async function() {
    await fetchData();
    if (currentTeacher) renderTeacher(currentTeacher);
    else renderDashboard();
  }, 8000);
}

init();
</script>
</body>
</html>
